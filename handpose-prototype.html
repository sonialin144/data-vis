<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handpose Pet Prototype</title>
    <!-- GLTFLoader imports bare "three"; browsers need this map (not Node resolution). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f5f5f5;
        overflow: hidden;
      }
      #canvas-holder {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      /* p5 sits under the WebGL layer so the GLTF shows through GL clear (alpha 0). */
      #canvas-holder > canvas {
        position: absolute;
        inset: 0;
        display: block;
        z-index: 1;
        background-color: transparent;
      }
      #dog-webgl-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      #dog-webgl-layer canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #camera-layer {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: #000;
      }
      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        max-width: min(90vw, 420px);
        backdrop-filter: blur(3px);
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1rem;
        font-weight: 600;
      }
      #status {
        margin: 0;
        font-size: 0.9rem;
        color: #9ad0ff;
      }
      .hint {
        margin: 0.45rem 0 0;
        font-size: 0.8rem;
        color: #cfcfcf;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.play@1.5.0/lib/p5.play.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
  </head>
  <body>
    <div class="hud">
      <h1>Handpose Pet Prototype</h1>
      <p id="status">Requesting webcam access...</p>
      <p class="hint">
        Each detected hand (up to several at once) gets its own ball and dog.
      </p>
    </div>
    <div id="camera-layer"></div>
    <div id="canvas-holder">
      <div id="dog-webgl-layer" aria-hidden="true"></div>
    </div>
    <script src="./handpose-prototype.js"></script>
  </body>
</html>
