<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handpose Pet Prototype</title>
    <!-- Three.js examples import the bare specifier "three"; without this map, GLTFLoader fails to load and dog3d stays disabled. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f5f5f5;
        overflow: hidden;
      }
      #canvas-holder {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }
      #canvas-holder > canvas {
        position: absolute;
        inset: 0;
        display: block;
        z-index: 2;
        background-color: transparent;
      }
      #dog-webgl-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 4;
        pointer-events: none;
      }
      #dog-webgl-layer canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #camera-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: #000;
      }
      #spawn-base {
        position: absolute;
        left: 50%;
        top: 42%;
        transform: translate(-50%, -50%);
        z-index: 2;
        pointer-events: none;
        opacity: 0.98;
      }
      #spawn-base img {
        display: block;
        width: 1080px;
        height: auto;
        user-select: none;
      }
      #interface-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 3072px;
        height: 1280px;
        transform-origin: top left;
        overflow: hidden;
      }
      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        max-width: min(90vw, 420px);
        backdrop-filter: blur(3px);
        display: none;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      #status {
        margin: 0;
        font-size: 1.05rem;
        color: #9ad0ff;
      }
      .hint {
        margin: 0.45rem 0 0;
        font-size: 0.95rem;
        color: #cfcfcf;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.play@1.5.0/lib/p5.play.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@1.2.1/dist/ml5.min.js"></script>
  </head>
  <body>
    <div class="hud">
      <h1>Handpose Pet Prototype</h1>
      <p id="status">Requesting webcam access...</p>
      <p class="hint">
        Each detected hand (up to several at once) gets its own ball and dog.
      </p>
    </div>
    <div id="interface-root">
      <div id="camera-layer"></div>
      <div id="spawn-base" aria-hidden="true">
        <img
          id="spawn-base-image"
          src="./assets/spawn-home-source.png"
          alt=""
          draggable="false"
        />
      </div>
      <div id="canvas-holder">
        <div id="dog-webgl-layer" aria-hidden="true"></div>
      </div>
    </div>
    <script src="./handpose-prototype.js"></script>
  </body>
</html>
