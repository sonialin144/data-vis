<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js Starter</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700;800&display=swap"
    />
    <style>
      /* Match sketch.js CANVAS_WIDTH / CANVAS_HEIGHT */
      :root {
        --canvas-w: 3072;
        --canvas-h: 1280;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #e8e8e8;
        font-family: sans-serif;
        overflow: hidden; /* no page scroll — canvas scales to fit */
      }

      /* Center the artboard; size is driven by the canvas CSS below */
      #sketch-holder {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      /*
        Scale display size to fit the viewport while keeping internal
        resolution 3072×1280 (p5 drawing coords unchanged).
      */
      #sketch-holder canvas {
        display: block;
        width: min(100vw, calc(100vh * var(--canvas-w) / var(--canvas-h))) !important;
        height: min(
          100vh,
          calc(100vw * var(--canvas-h) / var(--canvas-w))
        ) !important;
        max-width: 100vw;
        max-height: 100vh;
      }

      #seq-next-btn {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #888;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      }
      #seq-next-btn:hover {
        background: #f5f5f5;
      }
      body:not(.dev-ui-visible) #seq-next-btn {
        visibility: hidden;
        pointer-events: none;
      }

      /* Secret hit target: same as page background */
      #dev-ui-toggle {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        width: 44px;
        height: 44px;
        padding: 0;
        margin: 0;
        border: none;
        background: #000;
        cursor: pointer;
      }
      #dev-ui-toggle:hover {
        outline: 2px solid rgba(232, 232, 232, 0.5);
        outline-offset: 2px;
        background: rgba(255, 255, 255, 0.08);
      }
      #dev-ui-toggle:focus {
        outline: none;
      }
      #dev-ui-toggle:focus-visible {
        outline: 2px solid #555;
        outline-offset: 2px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script defer src="./gachaCopy.js"></script>
    <script defer src="./capsuleComponent.js"></script>
    <script defer src="./sketch.js"></script>
  </head>
  <body>
    <button type="button" id="seq-next-btn" title="Start sequence (idle) or restore (done); during run, skip ahead">
      Next sequence
    </button>
    <button
      type="button"
      id="dev-ui-toggle"
      aria-label="Toggle developer controls"
      title=""
    ></button>
    <main id="sketch-holder"></main>
    <script>
      document.getElementById("dev-ui-toggle").addEventListener("click", function () {
        document.body.classList.toggle("dev-ui-visible");
      });
    </script>
  </body>
</html>
