<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handpose Pet Prototype</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f5f5f5;
        overflow: hidden;
      }
      #canvas-holder {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }
      #camera-layer {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: #000;
      }
      .grass-strip {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 260px;
        z-index: 2;
        pointer-events: none;
        background-image: url("./assets/grass-ground.png");
        background-repeat: repeat-x;
        background-position: bottom center;
        background-size: auto 100%;
        image-rendering: pixelated;
      }
      #interface-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 3072px;
        height: 1280px;
        transform-origin: top left;
        overflow: hidden;
      }
      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        max-width: min(90vw, 420px);
        backdrop-filter: blur(3px);
        display: none;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1rem;
        font-weight: 600;
      }
      #status {
        margin: 0;
        font-size: 0.9rem;
        color: #9ad0ff;
      }
      .hint {
        margin: 0.45rem 0 0;
        font-size: 0.8rem;
        color: #cfcfcf;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.play@1.5.0/lib/p5.play.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  </head>
  <body>
    <div class="hud">
      <h1>Handpose Pet Prototype</h1>
      <p id="status">Requesting webcam access...</p>
      <p class="hint">Show your hand to attach a toy. A pet will run to it.</p>
    </div>
    <div id="interface-root">
      <div id="camera-layer"></div>
      <div class="grass-strip"></div>
      <div id="canvas-holder"></div>
    </div>
    <script src="./handpose-prototype.js"></script>
  </body>
</html>
