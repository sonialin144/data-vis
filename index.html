<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js Starter</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700;800&display=swap"
    />
    <style>
      /* Match sketch.js CANVAS_WIDTH / CANVAS_HEIGHT */
      :root {
        --canvas-w: 3072;
        --canvas-h: 1280;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #e8e8e8;
        font-family: sans-serif;
        overflow: hidden; /* no page scroll — canvas scales to fit */
      }

      /* Center the artboard; size is driven by the canvas CSS below */
      #sketch-holder {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      /*
        Scale display size to fit the viewport while keeping internal
        resolution 3072×1280 (p5 drawing coords unchanged).
      */
      #sketch-holder canvas {
        display: block;
        width: min(
          100vw,
          calc(100vh * var(--canvas-w) / var(--canvas-h))
        ) !important;
        height: min(
          100vh,
          calc(100vw * var(--canvas-h) / var(--canvas-w))
        ) !important;
        max-width: 100vw;
        max-height: 100vh;
      }

      #seq-next-btn {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #888;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      }
      #seq-next-btn:hover {
        background: #f5f5f5;
      }
      body:not(.dev-ui-visible) #seq-next-btn {
        visibility: hidden;
        pointer-events: none;
      }

      /* Secret hit target: same as page background */
      #dev-ui-toggle {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        width: 44px;
        height: 44px;
        padding: 0;
        margin: 0;
        border: none;
        background: #000;
        cursor: pointer;
      }
      #dev-ui-toggle:hover {
        outline: 2px solid rgba(232, 232, 232, 0.5);
        outline-offset: 2px;
        background: rgba(255, 255, 255, 0.08);
      }
      #dev-ui-toggle:focus {
        outline: none;
      }
      #dev-ui-toggle:focus-visible {
        outline: 2px solid #555;
        outline-offset: 2px;
      }

      #gesture-overlay {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 20;
        min-width: 320px;
        padding: 10px 12px;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font:
          12px/1.4 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        color: #e8e8e8;
        white-space: pre-line;
      }
      body:not(.dev-ui-visible) #gesture-overlay {
        opacity: 0;
        pointer-events: none;
      }

      #gesture-start-btn {
        margin-top: 8px;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 6px;
        border: 1px solid #bbb;
        cursor: pointer;
      }

      #gesture-camera {
        position: fixed;
        right: 12px;
        bottom: 12px;
        width: 240px;
        height: 135px;
        z-index: 20;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: #000;
        object-fit: cover;
        transform: scaleX(-1);
      }
      /* Dev HUD off: hide preview but keep video decoding so TM + gacha pull still run */
      body:not(.dev-ui-visible) #gesture-camera {
        right: auto;
        bottom: auto;
        left: -320px;
        top: 0;
        opacity: 0.01;
        pointer-events: none;
        z-index: 0;
        border: none;
      }

      #pull-countdown {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        padding: 10px 16px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-family: "Instrument Sans", sans-serif;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.15;
        visibility: hidden;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
    <script defer src="./gachaCopy.js"></script>
    <script defer src="./capsuleComponent.js"></script>
    <script defer src="./sketch.js"></script>
  </head>
  <body>
    <button
      type="button"
      id="seq-next-btn"
      title="Start sequence (idle) or restore (done); during run, skip ahead"
    >
      Next sequence
    </button>
    <button
      type="button"
      id="dev-ui-toggle"
      aria-label="Toggle developer controls"
      title=""
    ></button>
    <aside id="gesture-overlay" aria-live="polite">
      <div id="gesture-status">Image model: not started</div>
      <button type="button" id="gesture-start-btn">Start camera</button>
    </aside>
    <div id="pull-countdown" aria-live="polite"></div>
    <video id="gesture-camera" autoplay playsinline muted></video>
    <main id="sketch-holder"></main>
    <script>
      (function () {
        const STORAGE_KEY = "gachaDevUiVisible";
        const body = document.body;
        const toggleBtn = document.getElementById("dev-ui-toggle");

        // Always start with controls hidden on page load.
        body.classList.remove("dev-ui-visible");

        toggleBtn.addEventListener("click", function () {
          const isVisible = body.classList.toggle("dev-ui-visible");
          try {
            window.localStorage.setItem(STORAGE_KEY, isVisible ? "1" : "0");
          } catch (err) {
            console.warn("Unable to persist dev UI visibility:", err);
          }
        });
      })();
    </script>
    <script type="module">
      const tf = window.tf;
      if (!tf) {
        console.error("TensorFlow.js missing — check tf.min.js script tag.");
      }

      /** Same folder as this page — keep `tm-my-image-model/` next to index.html. */
      const MODEL_URL = "./tm-my-image-model/model.json";
      const META_URL = "./tm-my-image-model/metadata.json";

      const videoEl = document.getElementById("gesture-camera");
      const statusEl = document.getElementById("gesture-status");
      const startBtn = document.getElementById("gesture-start-btn");
      const countdownEl = document.getElementById("pull-countdown");

      const PROCESS_EVERY_MS = 120;
      const PULL_COUNTDOWN_MS = 20000;
      const TRACK_SUSTAIN_MS = 2500;
      const CANVAS_W = 3072;
      const CANVAS_H = 1280;

      /** Fire when any class softmax probability is at least this (0–1). */
      const TRIGGER_CONFIDENCE = 0.75;

      let model = null;
      let metadata = null;
      let imageSize = 224;
      let labels = ["Class 1", "Class 2"];
      let procCanvas = null;
      let procCtx = null;
      let lastProcessedMs = 0;
      let rafId = 0;
      let cameraStream = null;
      let pullDeadlineMs = null;
      let trackingStartMs = null;
      let inferBusy = false;

      function setStatus(lines) {
        statusEl.textContent = lines.join("\n");
      }

      function computeCanvasScale() {
        return Math.min(
          window.innerWidth / CANVAS_W,
          window.innerHeight / CANVAS_H,
        );
      }

      function applyCountdownTypographyScale() {
        const s = computeCanvasScale();
        const sizePx = Math.max(18, Math.round(36 * s));
        const padY = Math.max(6, Math.round(10 * s));
        const padX = Math.max(10, Math.round(16 * s));
        const topPx = Math.max(10, Math.round(24 * s));
        countdownEl.style.fontSize = `${sizePx}px`;
        countdownEl.style.padding = `${padY}px ${padX}px`;
        countdownEl.style.top = `${topPx}px`;
      }

      function bridge() {
        return window.gachaGestureBridge || null;
      }

      function ensureBridgeReady(maxWaitMs = 5000) {
        const started = performance.now();
        return new Promise((resolve, reject) => {
          const tick = () => {
            const b = bridge();
            if (
              b &&
              typeof b.triggerPull === "function" &&
              typeof b.resetAfterReveal === "function" &&
              typeof b.getPhase === "function" &&
              typeof b.getRevealShellColor === "function"
            ) {
              resolve(b);
              return;
            }
            if (performance.now() - started > maxWaitMs) {
              reject(
                new Error("Gacha bridge from sketch.js is not available."),
              );
              return;
            }
            window.setTimeout(tick, 100);
          };
          tick();
        });
      }

      async function loadModelAndMeta() {
        if (model) return;
        if (!tf) throw new Error("TensorFlow.js not loaded");
        const metaRes = await fetch(META_URL);
        metadata = await metaRes.json();
        model = await tf.loadLayersModel(MODEL_URL);
        if (metadata.labels && metadata.labels.length) labels = metadata.labels;
        if (metadata.imageSize) imageSize = metadata.imageSize;
        procCanvas = document.createElement("canvas");
        procCanvas.width = imageSize;
        procCanvas.height = imageSize;
        procCtx = procCanvas.getContext("2d", { willReadFrequently: true });
      }

      function stopLoop() {
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = 0;
        }
      }

      async function buildLaptopCameraConstraints() {
        const base = {
          width: { ideal: 1280 },
          height: { ideal: 720 },
        };
        if (
          !navigator.mediaDevices ||
          !navigator.mediaDevices.enumerateDevices
        ) {
          return { video: base, audio: false };
        }
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const firstVideoInput = devices.find((d) => d.kind === "videoinput");
          if (firstVideoInput && firstVideoInput.deviceId) {
            return {
              video: {
                ...base,
                deviceId: { exact: firstVideoInput.deviceId },
              },
              audio: false,
            };
          }
        } catch (err) {
          console.warn("Could not enumerate camera devices:", err);
        }
        return { video: base, audio: false };
      }

      /** Mirror horizontally to match on-screen preview (CSS scaleX(-1)). */
      function drawVideoToProcCanvas() {
        const w = imageSize;
        const h = imageSize;
        procCtx.save();
        procCtx.translate(w, 0);
        procCtx.scale(-1, 1);
        procCtx.drawImage(videoEl, 0, 0, w, h);
        procCtx.restore();
      }

      async function predictProbs() {
        if (!model || !videoEl.videoWidth) return null;
        drawVideoToProcCanvas();
        const tensor = tf.browser
          .fromPixels(procCanvas, 3)
          .toFloat()
          .expandDims(0)
          .div(255);
        const pred = model.predict(tensor);
        tensor.dispose();
        const data = await pred.data();
        pred.dispose();
        return Array.from(data);
      }

      function tick(gestureBridge) {
        rafId = requestAnimationFrame(() => tick(gestureBridge));
        if (!model || !videoEl.videoWidth || !videoEl.videoHeight) return;
        if (inferBusy) return;
        const now = performance.now();
        if (now - lastProcessedMs < PROCESS_EVERY_MS) return;
        lastProcessedMs = now;
        inferBusy = true;

        predictProbs()
          .then((probs) => {
            if (!probs || !probs.length) return;

            const phase = gestureBridge.getPhase();
            let triggered = false;
            const countdownActive = pullDeadlineMs != null;

            let topIdx = 0;
            let topP = probs[0] ?? 0;
            for (let i = 1; i < probs.length; i++) {
              if (probs[i] > topP) {
                topP = probs[i];
                topIdx = i;
              }
            }
            const high = probs.some((p) => p >= TRIGGER_CONFIDENCE);

            if (high) {
              if (trackingStartMs == null) trackingStartMs = now;
            } else {
              trackingStartMs = null;
            }
            const trackingSustainMs =
              trackingStartMs == null ? 0 : now - trackingStartMs;
            const trackingSustained = trackingSustainMs >= TRACK_SUSTAIN_MS;

            if (phase === "play" && trackingSustained && !countdownActive) {
              triggered = gestureBridge.triggerPull();
              if (triggered) {
                pullDeadlineMs = now + PULL_COUNTDOWN_MS;
                trackingStartMs = null;
              }
            }

            let countdownLine = "Countdown: ready";
            if (pullDeadlineMs != null) {
              const msLeft = Math.max(0, pullDeadlineMs - now);
              const secondsLeft = Math.ceil(msLeft / 1000);
              countdownLine = `Countdown: ${secondsLeft}s`;
              if (phase === "postReveal") {
                const revealShellColor = gestureBridge.getRevealShellColor();
                countdownEl.style.color = revealShellColor || "#fff";
                countdownEl.textContent = `Reset in ${secondsLeft}s`;
                countdownEl.style.visibility = "visible";
              } else {
                countdownEl.style.visibility = "hidden";
              }
              if (msLeft <= 0) {
                const resetOk = gestureBridge.resetAfterReveal();
                if (resetOk) pullDeadlineMs = null;
              }
            } else {
              countdownEl.style.visibility = "hidden";
            }

            const labelStr = labels
              .map((l, i) => `${l}: ${(probs[i] * 100).toFixed(0)}%`)
              .join("  ");

            setStatus([
              `Image: ${triggered ? "TRIGGERED" : "detecting"}`,
              `Phase: ${phase}`,
              `Trigger: any class ≥ ${(TRIGGER_CONFIDENCE * 100).toFixed(0)}%`,
              `Top: ${labels[topIdx] ?? "?"} ${(topP * 100).toFixed(1)}%  lock: ${trackingSustained ? "yes" : "no"}`,
              labelStr,
              `Hold ${Math.max(0, TRACK_SUSTAIN_MS - Math.floor(trackingSustainMs))}ms`,
              countdownLine,
            ]);
          })
          .finally(() => {
            inferBusy = false;
          });
      }

      async function startImageRuntime() {
        if (cameraStream) {
          setStatus(["Image model: active", "Camera already running"]);
          return;
        }
        startBtn.disabled = true;
        startBtn.textContent = "Starting...";
        try {
          const gestureBridge = await ensureBridgeReady();
          setStatus(["Image model: loading TensorFlow + weights..."]);
          await loadModelAndMeta();
          setStatus(["Image model: requesting camera..."]);
          const constraints = await buildLaptopCameraConstraints();
          cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
          videoEl.srcObject = cameraStream;
          await videoEl.play();
          startBtn.textContent = "Camera active";
          setStatus([
            "Image model: active",
            "Phase: " + gestureBridge.getPhase(),
          ]);
          tick(gestureBridge);
        } catch (err) {
          startBtn.disabled = false;
          startBtn.textContent = "Retry";
          setStatus([
            "Image model: failed",
            String(err && err.message ? err.message : err),
          ]);
        }
      }

      startBtn.addEventListener("click", startImageRuntime);
      window.addEventListener("resize", applyCountdownTypographyScale);
      window.addEventListener("load", () => {
        applyCountdownTypographyScale();
        startImageRuntime();
      });
      window.addEventListener("beforeunload", () => {
        stopLoop();
        if (cameraStream) cameraStream.getTracks().forEach((t) => t.stop());
      });
      setStatus(["Image model: idle", "Press Start camera"]);
    </script>
  </body>
</html>
